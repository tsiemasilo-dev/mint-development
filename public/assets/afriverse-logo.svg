<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .africa-continent { fill: #FF6B35; }
      .africa-accent { fill: #004E89; }
      .africa-highlight { fill: #F7931E; }
    </style>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#F7931E" stroke-width="2" opacity="0.3"/>

  <!-- Africa continent simplified shape -->
  <g class="africa-continent">
    <!-- Main continent body -->
    <path d="M 35 20 L 50 18 L 60 22 L 65 25 L 68 30 L 70 35 L 72 42 L 71 50 L 72 58 L 70 65 L 68 72 L 65 78 L 60 82 L 50 85 L 40 82 L 35 78 L 32 72 L 30 65 L 28 58 L 27 50 L 28 42 L 30 35 L 32 28 L 35 20 Z"/>
  </g>

  <!-- Northern accent (East Africa) -->
  <g class="africa-accent">
    <circle cx="58" cy="35" r="3.5"/>
    <circle cx="62" cy="42" r="3"/>
  </g>

  <!-- Southern accent (South Africa) -->
  <g class="africa-highlight">
    <circle cx="55" cy="70" r="3.5"/>
  </g>

  <!-- West accent -->
  <g class="africa-accent">
    <circle cx="33" cy="55" r="2.5"/>
  </g>

  <!-- Text arc (AfriVerse) -->
  <defs>
    <path id="topArc" d="M 15 50 A 35 35 0 0 1 85 50" fill="none"/>
  </defs>
  <text font-size="11" font-weight="bold" fill="#004E89" letter-spacing="1">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">
      AFRIVERSE
    </textPath>
  </text>
</svg>
